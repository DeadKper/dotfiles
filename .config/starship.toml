format = """
$distrobox\
$shell\
$directory$git_branch$git_commit$git_state$git_status$git_metrics$all\
$fill\
$container\
$status\
$cmd_duration\
$jobs\
$battery\
$time \
$line_break\
$character\
"""

command_timeout = 100
scan_timeout = 50
add_newline = false

[profiles]
transient="""
$character\
"""

rtransient="""
$status\
$cmd_duration\
$time\
"""

[status]
disabled = false
style = "#ee5396"

[line_break]
disabled = false

[fill]
disabled = false
symbol = " "

[character]
success_symbol = "[έζψ](bold #be95ff)"
error_symbol = "[έζψ](bold #ee5396)"

[custom.distrobox]
description = "The activated distrobox/toolbox container"
symbol = "Ό╢Χ "
command = "echo -n $CONTAINER_ID"
when = """ [[ -n "$CONTAINER_ID"  ]] """
style = "bold red dimmed"
format = "[$symbol \\[$output\\]]($style) "
disabled = false

[time]
disabled = false
style = "#8d8d8d"
format = "[$time]($style)"

[container]
style = "#08bdba"
symbol = "ΌΚΠ "
format = " [$symbol\\[$name\\]]($style) "

[directory]
style = "#78a9ff"
truncation_length = 10
truncate_to_repo = false
repo_root_style = "bold #78a9ff"
read_only = " ≤░Ν╛"

[shell]
style = "#e0e0e0"
disabled = false

[aws]
style = "#78a9ff"
symbol = "ΎΔψ "

