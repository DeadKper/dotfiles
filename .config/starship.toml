format = """
$shell\
$directory\
${custom.distrobox}\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$all\
$fill\
$container\
$status\
$cmd_duration\
$jobs\
$battery\
$time\
$line_break\
$character\
"""

continuation_prompt = '[ÔêÖ](#8d8d8d) '

command_timeout = 500
scan_timeout = 50
add_newline = false

[profiles]
fast_left = "$shell$directory$fill$container$status$cmd_duration$jobs$battery$time$line_break$character"
transient_left = "$character"
transient_right = "$status$cmd_duration$jobs$time"
statusline = "$directory$git_branch$git_status$git_metrics$fill${custom.statusline_model}${custom.statusline_cost}${custom.statusline_ctx_low}${custom.statusline_ctx_med}${custom.statusline_ctx_high}${custom.statusline_caveman}${custom.statusline_savings}$time"

[custom.distrobox]
description = "The activated distrobox/toolbox container"
symbol = "¯Âò "
command = "echo -n $CONTAINER_ID"
when = """ [[ -n "$CONTAINER_ID"  ]] """
style = "bold red dimmed"
format = "[$symbol \\[$output\\]]($style) "

[custom.statusline_model]
description = "Statusline: Active model name"
command = 'echo "$STATUSLINE_MODEL"'
when = 'test -n "$STATUSLINE_MODEL"'
style = "#66ccff"
format = "[$output]($style) "

[custom.statusline_cost]
description = "Statusline: Session cost in USD"
command = 'echo "$STATUSLINE_COST"'
when = 'test -n "$STATUSLINE_COST"'
symbol = "\\$"
style = "#2dcc66"
format = '[$symbol$output]($style) '

# using "[$symbol]($style) [$output%]($style)" as a workaround for statusline
[custom.statusline_ctx_low]
description = "Statusline: Context usage <50%"
command = 'echo "$STATUSLINE_PCT"'
when = 'test -n "$STATUSLINE_PCT" && test "$STATUSLINE_PCT" -lt 50'
symbol = "¾░ıø"
style = "#ffafd7"
format = "[$symbol]($style) [$output%]($style) "

[custom.statusline_ctx_med]
description = "Statusline: Context usage 50-79%"
command = 'echo "$STATUSLINE_PCT"'
when = 'test -n "$STATUSLINE_PCT" && test "$STATUSLINE_PCT" -ge 50 && test "$STATUSLINE_PCT" -lt 80'
symbol = "¾░ıø "
style = "#ff7eb6"
format = "[$symbol]($style) [$output%]($style) "

[custom.statusline_ctx_high]
description = "Statusline: Context usage >=80%"
command = 'echo "$STATUSLINE_PCT"'
when = 'test -n "$STATUSLINE_PCT" && test "$STATUSLINE_PCT" -ge 80'
symbol = "¾░ıø "
style = "#ee5396"
format = "[$symbol]($style) [$output%]($style) "

[custom.statusline_caveman]
description = "Statusline: Active caveman mode"
command = 'echo "$STATUSLINE_CAVEMAN"'
when = 'test -n "$STATUSLINE_CAVEMAN"'
symbol = "¯èĞ"
style = "#be95ff"
format = "[$symbol]($style) [$output]($style) "

[custom.statusline_savings]
description = "Statusline: Caveman token savings"
command = 'echo "$STATUSLINE_SAVINGS"'
when = 'test -n "$STATUSLINE_SAVINGS"'
symbol = "¾░óÀ"
style = "#be95ff"
format = "[$symbol]($style) [$output]($style) "

[git_branch]
symbol = "´Éİ"
style = "bold #ff7eb6"
format = '[on](fg:#e0e0e0) [$symbol]($style) [$branch(:$remote_branch)]($style) '

[git_commit]
tag_symbol = '´ÉÆ '

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
style = "bold #ee5396"
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
format = '([\[$all_status$ahead_behind\]]($style) )'

[git_metrics]
disabled = false
added_style = "#42be65"
deleted_style = "#ee5396"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

