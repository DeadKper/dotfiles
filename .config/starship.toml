format = """
$shell\
$directory$git_branch$git_commit$git_state$git_status$git_metrics$all\
$fill\
$container\
$status\
$cmd_duration\
$jobs\
$battery\
$time \
$line_break\
$character\
"""

command_timeout = 100
add_newline = false

[profiles]
transient="""
$character\
"""

rtransient="""
$status\
$cmd_duration\
$time \
"""

[status]
disabled = false
style = "#ee5396"

[line_break]
disabled = false

[fill]
disabled = false
symbol = " "

[character]
