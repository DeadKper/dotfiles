format = """
$distrobox\
$shell\
$directory$git_branch$git_commit$git_state$git_status$git_metrics$all\
$fill\
$container\
$status\
$cmd_duration\
$jobs\
$battery\
$time \
$line_break\
$character\
"""

command_timeout = 100
scan_timeout = 50
add_newline = false

[profiles]
transient = """
$character\
"""

rtransient = """
$status\
$cmd_duration\
$time\
"""

[status]
disabled = false
style = "#ee5396"

[line_break]
disabled = false

[fill]
disabled = false
symbol = " "

[character]
success_symbol = "[❯](bold #be95ff)"
error_symbol = "[❯](bold #ee5396)"

[custom.distrobox]
description = "The activated distrobox/toolbox container"
symbol = " "
command = "echo -n $CONTAINER_ID"
when = """ [[ -n "$CONTAINER_ID"  ]] """
style = "bold red dimmed"
format = "[$symbol \\[$output\\]]($style) "
disabled = false

[time]
disabled = false
style = "#8d8d8d"
format = "[$time]($style)"

[container]
style = "#08bdba"
symbol = " "
format = " [$symbol\\[$name\\]]($style) "

[directory]
style = "#78a9ff"
truncation_length = 10
truncate_to_repo = false
repo_root_style = "bold #78a9ff"
read_only = " 󰌾"

[shell]
style = "#e0e0e0"
disabled = false

[aws]
style = "#78a9ff"
symbol = " "

[buf]
style = "#78a9ff"
symbol = " "

[c]
style = "#78a9ff"
symbol = " "

[conda]
style = "#78a9ff"
symbol = " "

[crystal]
style = "#78a9ff"
symbol = " "

[dart]
style = "#78a9ff"
symbol = " "

[docker_context]
style = "#78a9ff"
symbol = " "

[elixir]
style = "#78a9ff"
symbol = " "

[elm]
style = "#78a9ff"
symbol = " "

[fennel]
style = "#78a9ff"
symbol = " "

[fossil_branch]
style = "#78a9ff"
symbol = " "

[gcloud]
style = "#78a9ff"
symbol = " "

[git_branch]
symbol = " "
style = "bold #ff7eb6"
format = '[on](fg:#e0e0e0) [$symbol$branch]($style) '

[git_commit]
tag_symbol = ' '

[git_status]
style = "bold #ee5396"
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
stashed = "$"
deleted = "✘"
renamed = "»"
modified = "!"
staged = "+${count}"
untracked = "?"
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
disabled = false
added_style = "#42be65"
deleted_style = "#ee5396"
format = '([ +$added]($added_style))([ -$deleted]($deleted_style))'

[golang]
style = "#78a9ff"
symbol = " "

[guix_shell]
style = "#78a9ff"
symbol = " "

[haskell]
style = "#78a9ff"
