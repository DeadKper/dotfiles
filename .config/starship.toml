style = "bold #ff7eb6"
format = '[on](fg:#e0e0e0) [$symbol$branch]($style) '

[git_commit]
tag_symbol = 'ΎΡΤ '

[git_status]
style = "bold #ee5396"
conflicted = "=${count}"
ahead = "έΘκ${count}"
behind = "έΘμ${count}"
stashed = "$"
deleted = "έεα"
renamed = "┬╗"
modified = "!"
staged = "+${count}"
untracked = "?"
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
disabled = false
added_style = "#42be65"
deleted_style = "#ee5396"
format = '([ +$added]($added_style) )([-$deleted]($deleted_style))'

