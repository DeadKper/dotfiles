
# в–Ҳв–‘в–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘

#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    force_no_accel = 1
    accel_profile = flat
    # numlock_by_default = true

    # рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = yes
    }

    repeat_rate = 50
    repeat_delay = 250
}

# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

device {
    name = ydotoold-virtual-device
    kb_layout = us
    kb_options =
    kb_variant =
}

general {
    layout = scrolling
}

dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
}

scrolling {
    fullscreen_on_one_column = false
}

binds {
    movefocus_cycles_fullscreen = true
    scroll_event_delay = 0
}

windowrule {
    name = game
    match:tag = game

    content = game
    workspace = 2
    # no_initial_focus = on
    idle_inhibit = focus
}

windowrule {
    name = tile
    match:tag = tile

    fullscreen_state = 0
    tile = on
}

windowrule {
    name = borderless
    match:tag = borderless

    idle_inhibit = focus
    border_size = 0
    rounding = 0
    size = 100% 100%
    opacity = 100%
}

windowrule {
    name = fullscreen
    match:tag = fullscreen

    fullscreen_state = 2
    fullscreen = on
}

# unbinds

unbind = $mainMod+Alt, Right
unbind = $mainMod+Alt, Left
unbind = $mainMod+Alt, Up
unbind = $mainMod+Alt, Down

# Mouse
unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up

bind = $mainMod+Ctrl, mouse_up, workspace, e+1
bind = $mainMod+Ctrl, mouse_down, workspace, e-1

bind = $mainMod, mouse_up, layoutmsg, focus r
bind = $mainMod, mouse_down, layoutmsg, focus l

bind = $mainMod+Alt, mouse_up, layoutmsg, swapcol r
bind = $mainMod+Alt, mouse_down, layoutmsg, swapcol l

bind = $mainMod+Shift, mouse_up, layoutmsg, colresize -conf
bind = $mainMod+Shift, mouse_down, layoutmsg, colresize +conf

bind = $mainMod+Ctrl+Alt, mouse_up, layoutmsg, movecoltoworkspace +1
bind = $mainMod+Ctrl+Alt, mouse_down, layoutmsg, movecoltoworkspace -1

# Layout binds

unbind = $mainMod, Left
unbind = $mainMod, Right
unbind = $mainMod, Up
unbind = $mainMod, Down
# unbind = Alt, Tab

bind = $mainMod, Left, layoutmsg, focus l
bind = $mainMod, Right, layoutmsg, focus r
bind = $mainMod, Up, layoutmsg, focus u
bind = $mainMod, Down, layoutmsg, focus d
# bind = Alt, Tab, layoutmsg, focus r

unbind = $mainMod SHIFT $CONTROL, left
unbind = $mainMod SHIFT $CONTROL, right
unbind = $mainMod SHIFT $CONTROL, up
unbind = $mainMod SHIFT $CONTROL, down

binded = $mainMod SHIFT $CONTROL, left,Move active window to the left,layoutmsg, movewindowto l
binded = $mainMod SHIFT $CONTROL, right,Move active window to the right,layoutmsg, movewindowto r
binded = $mainMod SHIFT $CONTROL, up,Move active window up,layoutmsg, movewindowto u
binded = $mainMod SHIFT $CONTROL, down,Move active window down,layoutmsg, movewindowto d

unbind = $mainMod+Ctrl+Alt, Right
unbind = $mainMod+Ctrl+Alt, Left

bind = $mainMod+Ctrl+Alt, Right, layoutmsg, movecoltoworkspace +1
bind = $mainMod+Ctrl+Alt, Left, layoutmsg, movecoltoworkspace -1

unbind = $mainMod+Alt, Right
unbind = $mainMod+Alt, Left
unbind = $mainMod+Alt, Up
unbind = $mainMod+Alt, Down

bind = $mainMod+Alt, Right, layoutmsg, swapcol r
bind = $mainMod+Alt, Left, layoutmsg, swapcol l
bind = $mainMod+Alt, Down, layoutmsg, promote

unbind = $mainMod+Shift, Right
unbind = $mainMod+Shift, Left
unbind = $mainMod+Shift, Up
unbind = $mainMod+Shift, Down

binde = $mainMod+Shift, Right, layoutmsg, colresize +conf
binde = $mainMod+Shift, Left, layoutmsg, colresize -conf
binde = $mainMod+Shift, Up, layoutmsg, colresize +0.1
binde = $mainMod+Shift, Down, layoutmsg, colresize -0.1

# lock on login for autologin

exec-once = hyprlock

# binds

bindl  = $mainMod+Ctrl, D, exec, $scrPath/volumecontrol.sh -o m
bindl  = $mainMod+Ctrl, S, exec, $scrPath/volumecontrol.sh -i m

bind = Ctrl, Print, exec, $scrPath/screenshot.sh s # partial screenshot capture
bind = $mainMod+Ctrl, Print, exec, $scrPath/screenshot.sh s # partial screenshot capture
bind = Shift, Print, exec, $scrPath/screenshot.sh sf # partial screenshot capture (frozen screen)
bind = $mainMod+Shift, Print, exec, $scrPath/screenshot.sh sf # partial screenshot capture (frozen screen)

$scripts = $HOME/.local/scripts # set custom scripts path

bind = $mainMod+Ctrl, V, exec, $scripts/cliptype 1

bind = Ctrl+Shift, S, exec, $scripts/hyprland-sendshortcut "Ctrl_Shift, M" class goofcord
bind = Ctrl+Shift, D, exec, $scripts/hyprland-sendshortcut "Ctrl_Shift, D" class goofcord

exec-once = [workspace 1 silent] $TERMINAL
exec-once = [workspace 1 silent] $BROWSER
exec-once = [workspace 1 silent] sleep 10 && flatpak run io.github.milkshiift.GoofCord
exec-once = [workspace 1 silent] sleep 10 && steam
exec-once = [workspace 3 silent] sleep 10 && flatpak run io.freetubeapp.FreeTube && while ! hyprctl dispatch movetoworkspacesilent 3,address:$(hyprctl -j clients | jq -r '.[] | select(.class == "io.freetubeapp.FreeTube") | .address') | grep -qi ok; do sleep 0.1; done
# exec-once = [workspace 3 silent] sleep 5 && flatpak run com.spotify.Client && while ! hyprctl dispatch closewindow address:$(hyprctl -j clients | jq -r '.[] | select(.class == "Spotify") | .address') | grep -qi ok; do sleep 0.1; done

exec-once = [silent] sleep 10 && $scripts/vpn up CA-11
# exec-once = [silent] steam -silent
exec-once = [silent] protonvpn-app --start-minimized
exec-once = [silent] $HOME/.local/share/deadkper/borderless.sh

windowrule = opacity 0.85 0.85, match:class ^(goofcord)$
windowrule = opacity 0.85 0.85, match:class ^(librewolf)$

# Window share
windowrule = float on, match:class ^(hyprland-share-picker)$

# Extensions
windowrule = float on, match:title ^(Extension: .*?)$, match:class ^(librewolf)$

# TeamSpeak
windowrule = tile on, match:initial_title ^(TeamSpeak)$, match:initial_class ^(TeamSpeak)$

# Steam
windowrule = tile on, match:initial_title ^(Steam)$, match:initial_class ^(Steam)$

# Wine/Proton tricks
windowrule = float on, match:title ^(Protontricks)$, match:class ^(zenity)$
windowrule = float on, match:title ^(Winetricks( - .*)?)$, match:class ^(zenity)$

# Freetube
windowrule = match:class ^((io\.freetubeapp\.)?FreeTube)$, no_max_size true
windowrule = match:class ^((io\.freetubeapp\.)?FreeTube)$, tile on
windowrule = opacity 0.85 0.85, match:class ^((io\.freetubeapp\.)?FreeTube)$

# Nextcloud desktop as floating
windowrule = float on, match:title ^(Nextcloud)$, match:class ^(com.nextcloud.desktopclient.nextcloud)$
windowrule = size 758 66% , match:title ^(Nextcloud)$, match:class ^(com.nextcloud.desktopclient.nextcloud)$
# Waybar has a size os 27
windowrule = move 100%-w-10 100%-w-37, match:title ^(Nextcloud)$, match:class ^(com.nextcloud.desktopclient.nextcloud)$

# Nextcloud desktop as floating
windowrule = float on, match:title ^(Proton VPN)$, match:class ^(protonvpn-app)$
windowrule = size 400 85% , match:title ^(Proton VPN)$, match:class ^(protonvpn-app)$
windowrule = move 100%-w-10 100%-w-37, match:title ^(Proton VPN)$, match:class ^(protonvpn-app)$

# Nextcloud desktop as floating
windowrule = float on, match:title ^(Extension: (Bitwarden Password Manager) - Bitwarden)

# Tile wine/proton/steam
windowrule = tile on, match:class ^(steam_app_\d+)$
windowrule = tile on, match:class ^(steam_proton)$
windowrule = tile on, match:class ^(gamescope)$

# Tile godot
windowrule = tile on, match:title ^(.* - Godot Engine)$, match:class ^(Godot)$
windowrule = tile on, match:initial_title ^(LibreOffice .*)$, match:initial_class ^(libreoffice-.*)$

# Games

# All steam games, modify ones with launchers below
windowrule = tag +game-borderless-tile, match:class ^(steam_app_\d+)$

# All gamescope windows, remove below if not a game
windowrule = tag +game-borderless-tile, match:class ^(gamescope)$

# Other installed games
# Minecraft
windowrule = tag +game, match:class ^(org.prismlauncher.PrismLauncher)$
windowrule = tag +game-borderless-tile, match:title ^(Minecraft\*.*)$, match:class ^(\s*|Minecraft\*.*)$

# Terraria
windowrule = tag +game-borderless-tile, match:title ^(Terraria.*)$, match:class ^(Terraria.bin.x86_64|dotnet)$

# Battle.net
# windowrule = tag +game-tile on, match:title ^(Battle.net)$, match:class ^(steam_proton)$
windowrule = tag +game-borderless-tile, match:title ^(StarCraft II)$, match:class ^(steam_proton)$
windowrule = tag +game-borderless-tile, match:title ^(Need for Speedв„ў Most Wanted)$, match:class ^(steam_proton)$

# Warframe launcher looks bad on fullscreen on
windowrule = tag -game-borderless-tile, match:class ^(steam_app_230410)$
windowrule = tag +game-tile, match:class ^(steam_app_230410)$

# REFramework.NET consoles
windowrule = tag -game-borderless-tile, match:title ^(Z:\\home\\.*)$, match:class ^(steam_app_\d+)$
windowrule = tag +game-tile, match:title ^(Z:\\home\\.*)$, match:class ^(steam_app_\d+)$

# Starcraft
windowrule = tag +game, match:title ^(StarCraft II Launcher)$, match:class ^(steam_proton)$

# Counter-Strike 2
windowrule = tag +game-borderless-tile, match:title ^(Counter-Strike 2)$, match:class ^(cs2)$

# Albion Online
windowrule = tag +game-borderless-tile, match:title ^(Albion Online Client)$, match:class ^(Albion-Online)$
windowrule = tag +game, match:title ^(Albion Online Launcher)$, match:class ^(Albion Online Launcher)$

# General games rule
# windowrule = tag +game-borderless-tile, match:class ^(.*(\.bin(\.x86_64)?|\.exe)|steam_proton)$

# Steam
windowrule = float on, match:class ^(steam)$
windowrule = tile on, match:title ^(Steam)$, match:class ^(steam)$

# Path of Exile config
# windowrule = tile on, match:title ^(.+ - )?Path of Building$

windowrule = tag +game-borderless-tile, match:title (Path of Exile), match:class (steam_app_238960|pathofexilesteam.exe)
windowrule = tag +game-borderless, match:title ^([Aa]wakened[ \-][Pp]o[Ee][ \-][Tt]rade)$
windowrule = tag +workspace4, match:title ^(.*Path of Building)$, match:class ^(steam_proton)$

windowrule {
    name = workspace4
    match:tag = workspace4

    workspace = 4
}

windowrule {
    name = awakened-poe-trade
    match:title = ^([Aa]wakened[ \-][Pp]o[Ee][ \-][Tt]rade)$

    idle_inhibit = focus
    no_blur = on
    no_shadow = on
    no_focus = on
    render_unfocused = on
    border_size = 0
    rounding = 0
    no_anim = on
    opacity = 100%

    fullscreen_state = 0 0
    float = on
    size = 100% 100%

    tag = +game
}

# All games to borderless for scrolling layout
# windowrule = tag +game-borderless-tile, match:tag gamefull

# Apply game rules

windowrule = tag +game, match:tag game-tile
windowrule = tag +game, match:tag game-borderless
windowrule = tag +game, match:tag game-borderless-tile
windowrule = tag +game, match:tag game-fullscreen

windowrule = tag +tile, match:tag game-tile
windowrule = tag +tile, match:tag game-borderless-tile
windowrule = tag +tile, match:tag borderless-tile

windowrule = tag +borderless, match:tag game-borderless
windowrule = tag +borderless, match:tag game-borderless-tile
windowrule = tag +borderless, match:tag borderless-tile

windowrule = tag +fullscreen, match:tag game-fullscreen

windowrule = tag -game-tile, match:tag game-tile
windowrule = tag -game-fullscreen, match:tag game-fullscreen
windowrule = tag -game-borderless, match:tag game-borderless
windowrule = tag -game-borderless-tile, match:tag game-borderless-tile
windowrule = tag -borderless-tile, match:tag borderless-tile
